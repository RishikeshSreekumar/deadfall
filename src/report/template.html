<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>deadfall</title>
<script>{{CYTOSCAPE}}</script>
<style>
{{STYLES}}</style>
</head>
<body>
<div id="bar">
  <b>deadfall</b>
  <span class="stat">total <span id="s-total"></span></span>
  <span class="stat dead">dead <span id="s-dead"></span></span>
  <span class="stat dip">dead-in-prod <span id="s-dip"></span></span>
  <div class="sep"></div>
  <label class="stat">view
    <select id="view"><!-- options injected from VIEW_PRESETS --></select>
  </label>
  <button id="grouping" title="toggle directory bubbles / all components"></button>
  <label class="stat"><input type="checkbox" id="edgesToggle" /> edges</label>
  <details id="adv">
    <summary title="advanced controls">⚙</summary>
    <div class="adv-pop">
      <label>layout
        <select id="layout"><!-- options injected from LAYOUT_MODES --></select>
      </label>
      <label>color
        <select id="color"><!-- options injected from COLOR_ENCODINGS --></select>
      </label>
      <label>size
        <select id="size"><!-- options injected from SIZE_ENCODINGS --></select>
      </label>
      <label>depth
        <select id="depth">
          <option value="1" selected>1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
      </label>
      <label>direction
        <select id="dir">
          <option value="both">both</option>
          <option value="dependents">dependents ↑</option>
          <option value="dependencies">dependencies ↓</option>
        </select>
      </label>
    </div>
  </details>
  <button id="reset">Reset view</button>
  <button id="theme" title="toggle light/dark">🌙</button>
  <span class="legend" id="legend"></span>
</div>
<div id="crumbs"><span class="cur">Overview — click a bubble or a component to dig in</span></div>
<div id="main">
  <div id="nav">
    <div class="controls">
      <div class="tabs">
        <button id="tab-triage" class="on">Triage</button>
        <button id="tab-tree">Tree</button>
      </div>
      <div class="searchwrap">
        <input id="search" placeholder="search components… (↑↓ Enter)" autocomplete="off" />
        <div id="searchresults"></div>
      </div>
      <select id="filter">
        <option value="all">all components</option>
        <option value="dead">dead only</option>
        <option value="dead-in-prod">dead-in-prod</option>
      </select>
    </div>
    <div id="navhint"></div>
    <div id="triage"></div>
    <div id="tree"></div>
  </div>
  <div id="cywrap">
    <div id="cy"></div>
    <div id="tip"></div>
    <div id="zoom">
      <button id="zin" title="zoom in">+</button>
      <button id="zout" title="zoom out">−</button>
      <button id="zfit" title="fit">⤢</button>
    </div>
  </div>
  <div id="panel"><span class="muted">Click a node to inspect it.</span></div>
</div>
<script>const MODEL = {{MODEL}};</script>
<script>{{CLIENT}}</script>
</body>
</html>
